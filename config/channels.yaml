# GrowthClaw Channel Configuration
# Lead delivery targets. Secrets live in .env.local (gitignored).

channels:
  # Primary: Slack Incoming Webhook → #all-growthclaw
  slack:
    enabled: true
    channel: "#all-growthclaw"
    webhook_url: "${SLACK_WEBHOOK_URL}"  # Set in .env.local
    format: "blocks"  # Use Slack Block Kit
    rate_limit_per_run: 10

  # Fallback: Telegram (disabled for hackathon)
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    format: "markdown"

  # Always-on: Local dashboard mirror (redundancy for demo)
  dashboard:
    enabled: true
    path: "data/dashboard.md"
    format: "markdown"
